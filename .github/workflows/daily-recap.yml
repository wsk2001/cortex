# Generate a daily progress summary.
# Runs at 6pm PST (2am UTC next day) and commits a recap to docs/.
#
# To enable: remove the "if: false" line below and set up the workflow.
# This requires a way to generate summaries -- options:
#   1. Simple: just log git commits from today (no AI needed)
#   2. Advanced: use Claude API or OpenAI API to summarize changes
#
# This template uses the simple approach (git log).

name: Daily Recap

on:
  schedule:
    - cron: '0 2 * * *'  # 6pm PST = 2am UTC next day
  workflow_dispatch:  # Allow manual trigger

jobs:
  recap:
    if: false  # Remove this line to enable -- AI does this during setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate daily recap
        run: |
          TODAY=$(date -u -d "yesterday" +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d)
          RECAP_FILE="docs/recaps/${TODAY}.md"
          mkdir -p docs/recaps

          echo "# Daily Recap: ${TODAY}" > "$RECAP_FILE"
          echo "" >> "$RECAP_FILE"

          # Commits from today
          echo "## Commits" >> "$RECAP_FILE"
          git log --since="${TODAY}T00:00:00" --until="${TODAY}T23:59:59" \
            --pretty=format:"- %s (%h)" >> "$RECAP_FILE" || echo "- No commits today" >> "$RECAP_FILE"
          echo "" >> "$RECAP_FILE"

          # Files changed
          echo "" >> "$RECAP_FILE"
          echo "## Files Changed" >> "$RECAP_FILE"
          git diff --stat "HEAD@{1 day ago}" HEAD 2>/dev/null >> "$RECAP_FILE" || echo "- Unable to determine" >> "$RECAP_FILE"

      - name: Commit recap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/recaps/
          git diff --cached --quiet || git commit -m "Daily recap: $(date -u -d 'yesterday' +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d)"
          git push
